<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    // Silently filter out benign, noisy websocket/Vite connection logs in preview iframe
    (function() {
      const origWarn = console.warn;
      const origError = console.error;
      const origLog = console.log;
      const shouldFilter = (...args) => {
         try {
           const str = args.map(arg => {
             if (typeof arg === 'string') return arg;
             if (arg instanceof Error) return arg.message + ' ' + arg.stack;
             try { return JSON.stringify(arg); } catch { return String(arg); }
           }).join(' ');
           return str.includes('[vite]') || 
                  str.includes('failed to connect to websocket') || 
                  str.includes('WebSocket connection to') ||
                  str.includes('connection aligned');
         } catch {
           return false;
         }
      };
      console.warn = function(...args) {
         if (shouldFilter(...args)) return;
         origWarn.apply(console, args);
      };
      console.error = function(...args) {
         if (shouldFilter(...args)) return;
         origError.apply(console, args);
      };
      console.log = function(...args) {
         if (shouldFilter(...args)) return;
         origLog.apply(console, args);
      };
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brgy Tanod S.O.S.</title>
</head>
<body>
  <div id="root">
    <!-- Preloader -->
    <div id="loader" style="
      position: fixed; 
      top: 0; left: 0; width: 100%; height: 100%; 
      background: #040b1a; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      z-index: 9999;
    ">
      <div style="text-align: center;">
        <div style="font-size: 2.5rem; color: #ef4444; margin-bottom: 1rem;">🚨</div>
        <div style="color: #fff; font-size: 1.2rem;">Loading Tanod S.O.S...</div>
      </div>
    </div>
  </div>

  <!-- Vite will inject the script here in production -->
  <script type="module" src="/src/main.tsx"></script>

  <script>
    // Remove loader once app loads
    window.addEventListener('load', () => {
      const loader = document.getElementById('loader');
      if (loader) {
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 600);
        }, 800);
      }
    });
  </script>
</body>
</html>
