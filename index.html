<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brgy Tanod S.O.S.</title>
</head>
<body>
  <div id="root">
    <!-- Preloader -->
    <div id="loader" style="
      position: fixed; 
      top: 0; left: 0; width: 100%; height: 100%; 
      background: #040b1a; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      z-index: 9999;
    ">
      <div style="text-align: center;">
        <div style="font-size: 2.5rem; color: #ef4444; margin-bottom: 1rem;">🚨</div>
        <div style="color: #fff; font-size: 1.2rem;">Loading Tanod S.O.S...</div>
      </div>
    </div>
  </div>

  <!-- Vite will inject the script here in production -->
  <script type="module" src="/src/main.tsx"></script>

  <script>
    // Remove loader once app loads
    window.addEventListener('load', () => {
      const loader = document.getElementById('loader');
      if (loader) {
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 600);
        }, 800);
      }
    });
  </script>
</body>
</html>
