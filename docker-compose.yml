version: '3.9'

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - ./certbot/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: .
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Asia/Manila
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    env_file:
      - .env
    depends_on:
      - qwenpaw
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qwenpaw:
    image: agentscope/qwenpaw:latest
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    ports:
      - "8088:8088"
    volumes:
      - qwenpaw-data:/app/working
      - qwenpaw-secrets:/app/working.secret
      - qwenpaw-backups:/app/working.backups
    environment:
      - TZ=Asia/Manila
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    ports:
      - "8089:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_NO_ANALYTICS=true

volumes:
  qwenpaw-data:
  qwenpaw-secrets:
  qwenpaw-backups:
