<svg width="512" height="512" viewBox="0 0 400 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="logoBackground" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1e2e" />
      <stop offset="100%" stop-color="#0a0a0f" />
    </radialGradient>
    <linearGradient id="shieldBorder" x1="0" y1="0" x2="400" y2="460">
      <stop offset="0%" stop-color="#64748b" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <filter id="emeraldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="crimsonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <clipPath id="shieldShape">
      <path d="M200 10 L380 60 L380 280 C380 380 200 450 200 450 C200 450 20 380 20 280 L20 60 L200 10Z" />
    </clipPath>
  </defs>

  <rect width="400" height="460" fill="#0a0a0f" />
  <path d="M200 10 L380 60 L380 280 C380 380 200 450 200 450 C200 450 20 380 20 280 L20 60 L200 10Z" fill="url(#logoBackground)" stroke="url(#shieldBorder)" stroke-width="8" />

  <g transform="translate(200, 95)" opacity="0.9">
    <circle r="25" fill="#fbbf24" filter="url(#emeraldGlow)" />
    <circle r="22" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" />
    <path d="M0 -36 L6 -26 L-6 -26 Z" fill="#fbbf24" transform="rotate(0)" />
    <path d="M0 -36 L6 -26 L-6 -26 Z" fill="#fbbf24" transform="rotate(45)" />
    <path d="M0 -36 L6 -26 L-6 -26 Z" fill="#fbbf24" transform="rotate(90)" />
    <path d="M0 -36 L6 -26 L-6 -26 Z" fill="#fbbf24" transform="rotate(135)" />
    <path d="M0 -36 L6 -26 L-6 -26 Z" fill="#fbbf24" transform="rotate(180)" />
    <path d="M0 -36 L6 -26 L-6 -26 Z" fill="#fbbf24" transform="rotate(225)" />
    <path d="M0 -36 L6 -26 L-6 -26 Z" fill="#fbbf24" transform="rotate(270)" />
    <path d="M0 -36 L6 -26 L-6 -26 Z" fill="#fbbf24" transform="rotate(315)" />
  </g>

  <g filter="url(#crimsonGlow)">
    <text x="200" y="185" text-anchor="middle" font-family="monospace" font-weight="900" font-size="24" fill="#94a3b8" letter-spacing="8" opacity="0.8">BRGY.</text>
    <text x="200" y="255" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="82" fill="white" letter-spacing="-1px">TANOD</text>
    <text x="200" y="325" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="104" fill="#ef4444" letter-spacing="-2px">S.O.S.</text>
  </g>
</svg>
